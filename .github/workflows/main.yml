name: HydroSense CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build with Maven
        run: mvn -B -ntp -DskipTests clean package

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15.5-alpine
        env:
          POSTGRES_DB: hydrosense
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d hydrosense"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run tests
        run: mvn -B -ntp test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hydrosense
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password

  deploy:
    name: Deploy Simulation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Simulate deploy to Staging
        run: |
          echo "Iniciando deploy para Staging..."
          echo "Aplicacao HydroSense implantada com sucesso em Staging ✅"
      - name: Simulate deploy to Production
        run: |
          echo "Iniciando deploy para Producao..."
          echo "Aplicacao HydroSense implantada com sucesso em Producao ✅"